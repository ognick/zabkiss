name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: addon/backend/go.mod
          cache-dependency-path: addon/backend/go.sum

      - name: Test
        working-directory: addon/backend
        run: go test ./...

      - name: Build
        working-directory: addon/backend
        run: CGO_ENABLED=0 go build ./cmd/zabkiss
