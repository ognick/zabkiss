name: Release

on:
  push:
    branches: [main]
    paths:
      - 'addon/config.yaml'

jobs:
  tag:
    name: Create tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' addon/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag "v${{ steps.version.outputs.version }}" || true
          git push origin "v${{ steps.version.outputs.version }}" || true

  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: tag
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - platform: linux/arm64
            arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: addon
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/ognick/zabkiss/zabkiss-addon/${{ matrix.arch }}:${{ needs.tag.outputs.version }}
            ghcr.io/ognick/zabkiss/zabkiss-addon/${{ matrix.arch }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/ognick/zabkiss
            org.opencontainers.image.version=${{ needs.tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
