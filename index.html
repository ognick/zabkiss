<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zabkiss Project</title>

    <meta name="yandex-verification" content="805a8cf586384c55" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    
    <style>
        body {
            background-color: #ffffff;
            margin: 0;
        }
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 45px;
        }
        /* Mobile padding adjustment */
        @media (max-width: 767px) {
            .markdown-body {
                padding: 15px;
            }
        }
    </style>
</head>
<body class="markdown-body">

    <div id="content">Loading documentation...</div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        // Fetch the README.md file from your repository
        fetch('README.md')
            .then(response => {
                if (!response.ok) throw new Error('Failed to load README.md');
                return response.text();
            })
            .then(markdown => {
                // Render Markdown to HTML and inject it into the div
                document.getElementById('content').innerHTML = marked.parse(markdown);
                
                // Optional: Set the page title to the first H1 found in the Markdown
                const title = document.querySelector('h1');
                if (title) document.title = title.innerText;
            })
            .catch(error => {
                console.error(error);
                document.getElementById('content').innerHTML = "Error: Could not load the documentation file.";
            });
    </script>

</body>
</html>
